# Codex MCP configuration for Toon Boom Harmony MCP server
# Trust this project in Codex to load the server automatically.

[mcp_servers.toon-boom-harmony]
command = "/opt/homebrew/bin/node"
args = ["/Users/romanmolodyko/Documents/toon-boom-harmony-mcp/dist/index.js"]
env_vars = ["HARMONY_BACKEND_IMAGE", "HARMONY_BACKEND_AUDIO", "HARMONY_BACKEND_LLM"]

[mcp_servers.toon-boom-harmony.env]
HARMONY_BACKEND_IMAGE = "none"
HARMONY_BACKEND_AUDIO = "none"
HARMONY_BACKEND_LLM = "none"
